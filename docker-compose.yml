# Easypanel-compatible Compose file for CHROMA.LAB.
# In Easypanel: create a "Compose" service pointed at this repo and set the
# environment variables listed below in the service's Environment tab.
# Easypanel injects them at container runtime, so no `:?` strict checks
# and no build args are used here.

services:
  chroma-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: chroma-lab:latest
    container_name: chroma-lab
    restart: unless-stopped
    ports:
      - "5273:5273"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5273
      # Server-side Supabase config (used by server functions / SSR)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      # Client-side Supabase config (read by the browser bundle at runtime)
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
      # Optional: only needed if Lovable AI features are used
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5273/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
